services:
  # 1. Server Service (Backend API & Socket.io)
  - type: web
    name: ansh-ebook-server
    env: node
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_FORCE
        value: "false"
      # These must be set manually in the Render dashboard:
      # - MONGODB_URI
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET
      # - JWT_SECRET

  # 2. Frontend Service (Static Site)
  - type: web
    name: ansh-ebook-frontend
    env: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
